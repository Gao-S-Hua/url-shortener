services:
  mysql:
    image: mysql:latest
    container_name: url-shortener-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: url_shortener

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: ./Dockerfile

    container_name: url-shortener-server
    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_DATABASE: url_shortener

    ports:
      - "3000:3000"

volumes:
  mysql-data:
